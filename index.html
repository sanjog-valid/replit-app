<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Orbit — Project Intelligence</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Manrope',sans-serif;background:#f8fafc}
    .mso{font-family:'Material Symbols Outlined';font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;font-style:normal;display:inline-flex;align-items:center;line-height:1;user-select:none}
    .mso-fill{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:4px}
    .canvas-grid{background-size:24px 24px;background-image:radial-gradient(circle,#e2e8f0 1px,transparent 1px)}
    .cell-over{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:#b91c1c}
    .cell-ok{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.3);color:#15803d}
    .cell-under{background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.25);color:#92400e}
    .cell-off{background:#f8fafc;border-color:#e2e8f0;color:#cbd5e1}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    @keyframes chartFade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes barRise{from{transform:scaleY(0)}to{transform:scaleY(1)}}
    @keyframes lineIn{from{opacity:0}to{opacity:1}}
    .spin{animation:spin 1s linear infinite;display:inline-block}
    .pulse{animation:pulse 2s ease-in-out infinite}
    .chart-anim{animation:chartFade .55s cubic-bezier(.4,0,.2,1) both}
    .bar-rise{transform-box:fill-box;transform-origin:50% 100%;animation:barRise .5s cubic-bezier(.4,0,.2,1) both}
    .line-in{animation:lineIn .6s ease-out both}
    .sidebar-transition{transition:width .2s cubic-bezier(.4,0,.2,1)}
    .heatcell{min-height:60px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useRef } = React;

/* ── TOKENS ─────────────────────────────────────────────────────────────── */
const BLUE   = "#137fec";
const BLUEbg = "#eff6ff";
const BLUElt = "#93c5fd";
const MONO   = {fontFamily:"'DM Mono',monospace"};
const SANS   = {fontFamily:"'Manrope',sans-serif"};

/* ── DATA ────────────────────────────────────────────────────────────────── */
const revData=[
  {m:"Oct",rev:41200,proj:38000},{m:"Nov",rev:52800,proj:48000},
  {m:"Dec",rev:47300,proj:50000},{m:"Jan",rev:61400,proj:58000},
  {m:"Feb",rev:74200,proj:70000},{m:"Mar",rev:84200,proj:78000},
];
const weekData=[
  {d:"Mon",tasks:14,done:11},{d:"Tue",tasks:18,done:16},
  {d:"Wed",tasks:12,done:9},{d:"Thu",tasks:22,done:19},
  {d:"Fri",tasks:16,done:16},{d:"Sat",tasks:4,done:4},{d:"Sun",tasks:2,done:2},
];
const autoData=[{w:"W1",n:142},{w:"W2",n:178},{w:"W3",n:201},{w:"W4",n:247}];
const clientRev=[
  {c:"Meridian",contracted:18400,collected:18400},
  {c:"Luma",contracted:32000,collected:24000},
  {c:"Fold",contracted:9500,collected:9500},
  {c:"Hartwell",contracted:14200,collected:10500},
  {c:"Prism",contracted:28000,collected:21800},
];
const projects=[
  {name:"Dashboard Redesign",client:"Meridian Co.",status:"Shipping",pct:88,trend:"+12%"},
  {name:"Patient Portal v2",client:"Luma Health",status:"Building",pct:61,trend:"+8%"},
  {name:"Brand Identity System",client:"Fold Studio",status:"In Review",pct:75,trend:"—"},
  {name:"API Integration",client:"Hartwell Inc.",status:"Blocked",pct:42,trend:"-4%"},
  {name:"ML Inference Pipeline",client:"Prism Labs",status:"Building",pct:29,trend:"+21%"},
];
const feedback=[
  {id:1,client:"Meridian Co.",pri:"High",ago:"2h ago",raw:"Make it feel less corporate and more like a tool I want to use every day",parsed:["Increase visual warmth in UI","Reduce density on main view","Add microinteraction on task complete"]},
  {id:2,client:"Luma Health",pri:"Medium",ago:"5h ago",raw:"The weekly report takes too long to generate, can we speed it up?",parsed:["Optimize report query < 2s","Add skeleton loading state","Cache previous week data"]},
  {id:3,client:"Hartwell Inc.",pri:"High",ago:"1d ago",raw:"We need to track who approved what and when for compliance",parsed:["Audit trail on all approvals","Timestamp + user attribution","Export audit log as CSV"]},
];
const statusCfg={
  "Shipping":{dot:"#22c55e",cls:"bg-slate-50 text-slate-600 border-slate-200"},
  "Building":{dot:BLUE,cls:"bg-slate-50 text-slate-600 border-slate-200"},
  "In Review":{dot:"#d97706",cls:"bg-slate-50 text-slate-600 border-slate-200"},
  "Blocked":{dot:"#ef4444",cls:"bg-red-50 text-red-700 border-red-100"},
};

/* ── SVG CHART HELPERS ───────────────────────────────────────────────────── */
function pts2path(pts){
  if(!pts||pts.length<2)return"";
  let d="M"+pts[0][0]+","+pts[0][1];
  for(let i=1;i<pts.length;i++){
    const p=pts[i-1],c=pts[i];
    const mx=(p[0]+c[0])/2;
    d+=" C"+mx+","+p[1]+" "+mx+","+c[1]+" "+c[0]+","+c[1];
  }
  return d;
}

function Spark({vals,color}){
  if(!vals||vals.length<2)return null;
  const W=100,H=38,pad=4;
  const max=Math.max(...vals),min=Math.min(...vals),rng=max-min||1;
  const xs=vals.map((_,i)=>(i/(vals.length-1))*W);
  const ys=vals.map(v=>H-pad-((v-min)/rng)*(H-pad*2));
  const pts=xs.map((x,i)=>[x,ys[i]]);
  const line=pts2path(pts);
  const area=line+" L"+W+","+H+" L0,"+H+" Z";
  const uid="sp"+(Math.random()*1e7|0);
  return(
    <svg viewBox={"0 0 "+W+" "+H} preserveAspectRatio="none" className="line-in" style={{display:"block",width:"100%",height:H}}>
      <defs>
        <linearGradient id={uid} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.22"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={area} fill={"url(#"+uid+")"}/>
      <path d={line} fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

function AreaChart({data,xKey,s1Key,s2Key,s1Color,s2Color,fmtY,h}){
  const W=500,H=h||200;
  const PL=48,PR=10,PT=8,PB=28;
  const cW=W-PL-PR,cH=H-PT-PB;
  const all=[...data.map(d=>d[s1Key]),...(s2Key?data.map(d=>d[s2Key]):[])];
  const maxV=Math.max(...all)*1.05,minV=0;
  const xS=i=>PL+(i/(data.length-1))*cW;
  const yS=v=>PT+cH-((v-minV)/(maxV-minV))*cH;
  const ticks=[0,.25,.5,.75,1].map(f=>minV+(maxV-minV)*f);
  const fmt=fmtY||(v=>"$"+(v/1000).toFixed(0)+"k");
  const uid1="ac1"+(Math.random()*1e7|0);
  const uid2="ac2"+(Math.random()*1e7|0);
  const pts1=data.map((d,i)=>[xS(i),yS(d[s1Key])]);
  const pts2=s2Key?data.map((d,i)=>[xS(i),yS(d[s2Key])]):null;
  const line1=pts2path(pts1);
  const area1=line1+" L"+xS(data.length-1)+","+(PT+cH)+" L"+xS(0)+","+(PT+cH)+" Z";
  const line2=pts2?pts2path(pts2):null;
  const area2=pts2?(line2+" L"+xS(data.length-1)+","+(PT+cH)+" L"+xS(0)+","+(PT+cH)+" Z"):null;
  return(
    <svg viewBox={"0 0 "+W+" "+H} className="chart-anim" style={{display:"block",width:"100%",height:H}}>
      <defs>
        <linearGradient id={uid1} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={s1Color} stopOpacity="0.14"/>
          <stop offset="100%" stopColor={s1Color} stopOpacity="0"/>
        </linearGradient>
        {s2Key&&<linearGradient id={uid2} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={s2Color||"#94a3b8"} stopOpacity="0.06"/>
          <stop offset="100%" stopColor={s2Color||"#94a3b8"} stopOpacity="0"/>
        </linearGradient>}
      </defs>
      {ticks.map((v,i)=>(
        <g key={i}>
          <line x1={PL} y1={yS(v)} x2={W-PR} y2={yS(v)} stroke="#f1f5f9" strokeWidth="1"/>
          <text x={PL-6} y={yS(v)+4} textAnchor="end" fill="#94a3b8" fontSize="10" fontFamily="Manrope">{fmt(v)}</text>
        </g>
      ))}
      {data.map((d,i)=>(
        <text key={i} x={xS(i)} y={H-6} textAnchor="middle" fill="#94a3b8" fontSize="10" fontFamily="Manrope">{d[xKey]}</text>
      ))}
      {area2&&<path d={area2} fill={"url(#"+uid2+")"} className="line-in"/>}
      {line2&&<path d={line2} fill="none" stroke={s2Color||"#cbd5e1"} strokeWidth="1.5" strokeDasharray="5 3" className="line-in"/>}
      <path d={area1} fill={"url(#"+uid1+")"} className="line-in"/>
      <path d={line1} fill="none" stroke={s1Color} strokeWidth="2.5" strokeLinecap="round" className="line-in"/>
      {pts1.map(([x,y],i)=>(
        <circle key={i} cx={x} cy={y} r="3.5" fill={s1Color} stroke="white" strokeWidth="2" className="line-in" style={{animationDelay:i*0.05+"s"}}/>
      ))}
    </svg>
  );
}

function BarChart({data,xKey,bars,fmtY,h}){
  const W=500,H=h||220;
  const PL=50,PR=10,PT=8,PB=28;
  const cW=W-PL-PR,cH=H-PT-PB;
  const allV=bars.flatMap(b=>data.map(d=>d[b.key]||0));
  const maxV=Math.max(...allV)*1.12;
  const fmt=fmtY||(v=>"$"+(v/1000).toFixed(0)+"k");
  const yS=v=>PT+cH-(v/maxV)*cH;
  const groupW=cW/data.length;
  const totalBarW=groupW*0.7;
  const bw=totalBarW/bars.length;
  const ticks=[0,.25,.5,.75,1].map(f=>maxV*f);
  return(
    <svg viewBox={"0 0 "+W+" "+H} style={{display:"block",width:"100%",height:H}}>
      {ticks.map((v,i)=>(
        <g key={i}>
          <line x1={PL} y1={yS(v)} x2={W-PR} y2={yS(v)} stroke="#f1f5f9" strokeWidth="1"/>
          <text x={PL-6} y={yS(v)+4} textAnchor="end" fill="#94a3b8" fontSize="10" fontFamily="Manrope">{fmt(v)}</text>
        </g>
      ))}
      {data.map((d,di)=>{
        const gx=PL+di*groupW+(groupW-totalBarW)/2;
        return bars.map((b,bi)=>{
          const bh=(d[b.key]||0)/maxV*cH;
          const x=gx+bi*bw;
          const y=PT+cH-bh;
          return(
            <rect key={bi} x={x} y={y} width={bw-2} height={bh} fill={b.color} rx="4" ry="4"
              className="bar-rise" style={{animationDelay:(di*bars.length+bi)*0.04+"s"}}/>
          );
        });
      })}
      {data.map((d,i)=>(
        <text key={i} x={PL+i*groupW+groupW/2} y={H-6} textAnchor="middle" fill="#94a3b8" fontSize="10" fontFamily="Manrope">{d[xKey]}</text>
      ))}
    </svg>
  );
}

function LineChart({data,xKey,yKey,color,fmtY,h}){
  const W=500,H=h||180;
  const PL=48,PR=10,PT=8,PB=28;
  const cW=W-PL-PR,cH=H-PT-PB;
  const vals=data.map(d=>d[yKey]);
  const maxV=Math.max(...vals)*1.1,minV=0;
  const xS=i=>PL+(i/(data.length-1))*cW;
  const yS=v=>PT+cH-((v-minV)/(maxV-minV))*cH;
  const fmt=fmtY||(v=>"$"+(v/1000).toFixed(0)+"k");
  const ticks=[0,.25,.5,.75,1].map(f=>minV+(maxV-minV)*f);
  const pts=data.map((d,i)=>[xS(i),yS(d[yKey])]);
  const line=pts2path(pts);
  const uid="lc"+(Math.random()*1e7|0);
  return(
    <svg viewBox={"0 0 "+W+" "+H} className="chart-anim" style={{display:"block",width:"100%",height:H}}>
      <defs>
        <linearGradient id={uid} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.12"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      {ticks.map((v,i)=>(
        <g key={i}>
          <line x1={PL} y1={yS(v)} x2={W-PR} y2={yS(v)} stroke="#f1f5f9" strokeWidth="1"/>
          <text x={PL-6} y={yS(v)+4} textAnchor="end" fill="#94a3b8" fontSize="10" fontFamily="Manrope">{fmt(v)}</text>
        </g>
      ))}
      {data.map((d,i)=>(
        <text key={i} x={xS(i)} y={H-6} textAnchor="middle" fill="#94a3b8" fontSize="10" fontFamily="Manrope">{d[xKey]}</text>
      ))}
      <path d={line+" L"+xS(data.length-1)+","+(PT+cH)+" L"+xS(0)+","+(PT+cH)+" Z"} fill={"url(#"+uid+")"} className="line-in"/>
      <path d={line} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" className="line-in"/>
      {pts.map(([x,y],i)=>(
        <circle key={i} cx={x} cy={y} r="4" fill={color} stroke="white" strokeWidth="2" className="line-in" style={{animationDelay:i*0.05+"s"}}/>
      ))}
    </svg>
  );
}

function DonutChart({slices,size}){
  const sz=size||150,cx=sz/2,cy=sz/2,R=sz*0.33,r=sz*0.2;
  const total=slices.reduce((s,d)=>s+d.v,0);
  let angle=-Math.PI/2;
  const paths=slices.map(d=>{
    const frac=d.v/total;
    const a0=angle,a1=angle+frac*2*Math.PI;
    angle=a1;
    const lf=frac>0.5?1:0;
    const x0=cx+R*Math.cos(a0),y0=cy+R*Math.sin(a0);
    const x1=cx+R*Math.cos(a1),y1=cy+R*Math.sin(a1);
    const ix0=cx+r*Math.cos(a0),iy0=cy+r*Math.sin(a0);
    const ix1=cx+r*Math.cos(a1),iy1=cy+r*Math.sin(a1);
    return{path:`M${x0},${y0} A${R},${R} 0 ${lf},1 ${x1},${y1} L${ix1},${iy1} A${r},${r} 0 ${lf},0 ${ix0},${iy0} Z`,color:d.color};
  });
  return(
    <svg viewBox={"0 0 "+sz+" "+sz} className="chart-anim" style={{display:"block",width:sz,height:sz}}>
      {paths.map((p,i)=>(
        <path key={i} d={p.path} fill={p.color} stroke="white" strokeWidth="2.5"/>
      ))}
    </svg>
  );
}

/* ── PRIMITIVES ──────────────────────────────────────────────────────────── */
const Card=({children,cls=""})=>(
  <div className={"bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden "+cls}>{children}</div>
);
const CH=({title,desc,right})=>(
  <div className="flex items-start justify-between px-6 pt-5 pb-4">
    <div>
      <p className="text-[13px] font-bold text-slate-800 leading-none mb-1">{title}</p>
      {desc&&<p className="text-[11px] text-slate-400 font-medium mt-0.5">{desc}</p>}
    </div>
    {right&&<div className="ml-4 flex-shrink-0">{right}</div>}
  </div>
);
const Hr=()=><div className="border-b border-slate-100"/>;

function Toggle({on}){
  const[checked,setChecked]=useState(on);
  return(
    <button onClick={()=>setChecked(!checked)}
      style={{width:44,height:24,borderRadius:99,background:checked?BLUE:"#e2e8f0",border:"none",cursor:"pointer",position:"relative",transition:"background .2s",flexShrink:0}}>
      <span style={{position:"absolute",top:2,left:checked?20:2,width:20,height:20,borderRadius:"50%",background:"white",boxShadow:"0 1px 3px rgba(0,0,0,.2)",transition:"left .2s"}}/>
    </button>
  );
}

const MC=({label,value,delta,up,sub,sparkVals,sparkColor})=>{
  const pill=up===true?"text-blue-700 bg-blue-50":up===false?"text-red-600 bg-red-50":"text-slate-400 bg-slate-100";
  return(
    <Card>
      <div className="px-5 pt-5 pb-3">
        <p className="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-2">{label}</p>
        <div className="flex items-baseline gap-2 mb-1">
          <span style={{...MONO,fontSize:26,fontWeight:700,color:"#0f172a",lineHeight:1}}>{value}</span>
          {delta&&<span className={"text-[9px] font-bold px-1.5 py-0.5 rounded-md "+pill}>{delta}</span>}
        </div>
        {sub&&<p className="text-[11px] text-slate-400 font-medium">{sub}</p>}
      </div>
      {sparkVals&&<Spark vals={sparkVals} color={sparkColor||BLUE}/>}
    </Card>
  );
};

/* ── TABS HELPER ─────────────────────────────────────────────────────────── */
function Tabs({tabs,active,setActive}){
  return(
    <div className="flex border-b border-slate-200 px-6 gap-6">
      {tabs.map(t=>(
        <button key={t.id} onClick={()=>setActive(t.id)}
          className="py-3 text-sm font-semibold transition-colors relative"
          style={{color:active===t.id?BLUE:"#94a3b8",border:"none",background:"none",cursor:"pointer"}}>
          {t.label}
          {active===t.id&&<span style={{position:"absolute",bottom:0,left:0,right:0,height:2,background:BLUE,borderRadius:2}}/>}
        </button>
      ))}
    </div>
  );
}

/* ── PAGE: OVERVIEW ──────────────────────────────────────────────────────── */
function OverviewPage(){
  return(
    <div className="px-7 py-6 space-y-5">
      <div className="grid grid-cols-4 gap-4">
        <MC label="Revenue MTD"     value="$84.2k" delta="+18%" up={true}  sub="vs $71.4k last month" sparkVals={revData.map(d=>d.rev)} sparkColor={BLUE}/>
        <MC label="Active Projects" value="6"      delta="+2"  up={true}  sub="across 5 clients"      sparkVals={weekData.map(d=>d.tasks)} sparkColor="#22c55e"/>
        <MC label="Tasks Automated" value="247"    delta="+28%"up={true}  sub="this week"             sparkVals={autoData.map(d=>d.n)} sparkColor="#8b5cf6"/>
        <MC label="Bottlenecks"     value="2"      delta="-"   up={false} sub="flagged today"         sparkVals={[1,1,3,2,2,2]} sparkColor="#ef4444"/>
      </div>
      <div className="grid grid-cols-3 gap-4">
        <Card cls="col-span-2">
          <CH title="Revenue Overview" desc="Actual vs projected — last 6 months"
            right={
              <div className="flex items-center gap-4 text-[9px] font-bold text-slate-400 uppercase tracking-wider">
                <span className="flex items-center gap-1.5"><span className="inline-block w-4 h-0.5 rounded-full" style={{background:BLUE}}/>Actual</span>
                <span className="flex items-center gap-1.5"><span className="inline-block w-4 h-0.5 rounded-full bg-slate-300"/>Projected</span>
              </div>
            }
          />
          <Hr/>
          <div className="px-4 pt-3 pb-4">
            <AreaChart data={revData} xKey="m" s1Key="rev" s2Key="proj" s1Color={BLUE} s2Color="#94a3b8" h={196}/>
          </div>
        </Card>
        <Card>
          <CH title="Project Status" desc="Current distribution"/>
          <Hr/>
          <div className="flex flex-col items-center px-4 pt-4 pb-5">
            <DonutChart size={148} slices={[{v:1,color:"#93c5fd"},{v:2,color:BLUE},{v:1,color:"#94a3b8"},{v:1,color:"#fca5a5"}]}/>
            <div className="grid grid-cols-2 gap-x-6 gap-y-2 w-full mt-4">
              {[["Shipping","#93c5fd"],["Building",BLUE],["In Review","#94a3b8"],["Blocked","#fca5a5"]].map(([n,c])=>(
                <div key={n} className="flex items-center gap-2">
                  <span className="w-2 h-2 rounded-sm flex-shrink-0" style={{background:c}}/>
                  <span className="text-[10px] font-semibold text-slate-500">{n}</span>
                </div>
              ))}
            </div>
          </div>
        </Card>
      </div>
      <div className="grid grid-cols-2 gap-4">
        <Card>
          <CH title="Active Projects" desc="All client work this cycle"
            right={<button className="text-[11px] font-semibold text-slate-500 border border-slate-200 rounded-lg px-3 py-1.5 hover:bg-slate-50 transition-colors">Export ↗</button>}
          />
          <Hr/>
          <div className="grid grid-cols-12 px-6 py-2 text-[8px] font-black tracking-widest uppercase text-slate-300">
            <div className="col-span-5">Project</div>
            <div className="col-span-3">Status</div>
            <div className="col-span-4">Progress</div>
          </div>
          <Hr/>
          {projects.map((p,i)=>{
            const sc=statusCfg[p.status];
            const barColor=p.status==="Blocked"?"#ef4444":BLUE;
            return(
              <div key={i}>

            <button className="w-full py-2 rounded-xl text-xs font-bold border border-slate-200 text-slate-500 hover:bg-slate-50 transition-colors">View All Invoices →</button>

        </Card>
      </div>
    </div>
  );
}

/* ── PAGE: FEEDBACK ──────────────────────────────────────────────────────── */
function FeedbackPage(){
  const[text,setText]=useState("");
  const[loading,setLoading]=useState(false);
  const[parsed,setParsed]=useState(null);
  const go=()=>{
    if(!text.trim())return;
    setLoading(true);setParsed(null);
    setTimeout(()=>{
      setLoading(false);
      setParsed(["Extract key action items from feedback","Assign priority by client tier","Route to relevant project backlog","Generate summary for weekly standup"]);
    },1400);
  };
  return(
    <div className="px-7 py-6 space-y-5">
      <Card>
        <div className="flex items-start justify-between px-6 pt-5 pb-4">
          <div>
            <p className="text-[13px] font-bold text-slate-800 leading-none mb-1">Submit Feedback</p>
            <p className="text-[11px] text-slate-400 font-medium mt-0.5">Paste raw client feedback — AI extracts action items</p>
          </div>
          <div className="flex items-center gap-1.5 px-2.5 py-1 rounded-full border" style={{background:BLUEbg,borderColor:BLUElt+"88"}}>
            <span className="pulse w-1.5 h-1.5 rounded-full inline-block" style={{background:BLUE}}/>
            <span className="text-[10px] font-bold" style={{color:BLUE}}>AI-Parsed</span>
          </div>
        </div>
        <Hr/>
        <div className="px-6 py-4 space-y-3">
          <textarea value={text} onChange={e=>{setText(e.target.value);setParsed(null);}}
            placeholder="Paste client feedback here… e.g. 'The onboarding flow is confusing and takes too many steps.'"
            rows={3}
            style={{...SANS,width:"100%",padding:"12px 14px",borderRadius:12,border:"1px solid #e2e8f0",fontSize:12,color:"#0f172a",background:"#f8fafc",outline:"none",resize:"vertical",lineHeight:1.6}}
            onFocus={e=>e.target.style.borderColor=BLUE}
            onBlur={e=>e.target.style.borderColor="#e2e8f0"}
          />
          <div className="flex items-center gap-3">
            <select className="flex-1 text-[12px] border border-slate-200 rounded-xl px-3 py-2.5 text-slate-700 outline-none bg-white font-medium" style={SANS}>
              {projects.map(p=><option key={p.name}>{p.name} — {p.client}</option>)}
            </select>
            <button onClick={go} disabled={loading||!text.trim()} className="flex items-center gap-2 px-5 py-2.5 rounded-xl text-white text-sm font-bold transition-opacity flex-shrink-0" style={{background:(!text.trim()||loading)?"#93c5fd":BLUE,cursor:(!text.trim()||loading)?"not-allowed":"pointer"}}>
              {loading
                ?<><span className="spin w-4 h-4 border-2 border-white border-t-transparent rounded-full"/>Parsing…</>
                :<>Parse &amp; Submit →</>}
            </button>
          </div>
          {parsed&&(
            <div className="p-4 rounded-xl border" style={{background:BLUEbg,borderColor:BLUElt+"66"}}>
              <p className="text-[9px] font-black uppercase tracking-widest mb-3" style={{color:BLUElt}}>Extracted Requirements</p>
              <ul className="space-y-2">
                {parsed.map((r,i)=>(
                  <li key={i} className="flex items-start gap-2">
                    <span className="font-black text-sm flex-shrink-0 mt-0.5" style={{color:BLUE}}>✓</span>
                    <span className="text-[12px] text-slate-700 font-medium">{r}</span>
                  </li>
                ))}
              </ul>
            </div>
          )}
        </div>
      </Card>
      <Card>
        <CH title="Feedback Inbox" desc="All parsed client feedback — last 7 days"
          right={
            <div className="flex items-center gap-2">
              <span className="text-[9px] font-bold px-2.5 py-1 rounded-full bg-red-50 text-red-500">2 High Priority</span>
              <button className="px-3 py-1.5 rounded-lg border border-slate-200 text-xs font-semibold text-slate-500 hover:bg-slate-50">Filter</button>
            </div>
          }
        />
        <Hr/>
        <div className="divide-y divide-slate-100">
          {feedback.map(f=>(
            <div key={f.id} className="px-6 py-4 hover:bg-slate-50 transition-colors cursor-pointer">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] font-bold text-slate-500 bg-slate-100 px-2 py-0.5 rounded-full">{f.client}</span>
                <span className="text-[9px] font-bold px-2 py-0.5 rounded-full" style={{background:f.pri==="High"?"#fef2f2":"#fffbeb",color:f.pri==="High"?"#ef4444":"#d97706"}}>{f.pri}</span>
                <span className="text-[9px] text-slate-300 ml-auto">{f.ago}</span>
              </div>
              <p className="text-[12px] italic text-slate-500 mb-3 leading-relaxed">"{f.raw}"</p>
              <div className="bg-slate-50 rounded-xl p-3">
                <p className="text-[9px] font-black uppercase tracking-widest text-slate-400 mb-2">AI-Extracted Actions</p>
                <ul className="space-y-1.5">
                  {f.parsed.map((r,j)=>(
                    <li key={j} className="flex items-start gap-2">
                      <span className="font-bold flex-shrink-0" style={{color:BLUE,fontSize:13,lineHeight:"1.3"}}>›</span>
                      <span className="text-[11px] text-slate-600 font-medium">{r}</span>
                    </li>
                  ))}
                </ul>
              </div>
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
}

/* ── SHELL ───────────────────────────────────────────────────────────────── */
const NAV=[
  {id:"overview",  icon:"grid_view",       label:"Overview"},
  {id:"clients",   icon:"business_center", label:"Clients"},
  {id:"automation",icon:"auto_fix_high",   label:"Automation"},
  {id:"workload",  icon:"calendar_today",  label:"Workload"},
  {id:"revenue",   icon:"payments",        label:"Revenue"},
  {id:"feedback",  icon:"forum",           label:"Feedback",badge:"3"},
];
const CLIENTS_LIST=[
  {name:"Meridian Co.",dot:BLUE},
  {name:"Luma Health",dot:"#22c55e"},
  {name:"Fold Studio",dot:"#a855f7"},
  {name:"Hartwell Inc.",dot:"#f59e0b"},
  {name:"Prism Labs",dot:"#ef4444"},
];
const TITLES={overview:"Dashboard",clients:"Clients",automation:"Automation",workload:"Workload",revenue:"Revenue",feedback:"Feedback"};

function Sidebar({page,setPage}){
  const[col,setCol]=useState(false);
  const w=col?52:224;
  return(
    <div className="sidebar-transition" style={{width:w,flexShrink:0,background:"white",borderRight:"1px solid #e2e8f0",display:"flex",flexDirection:"column",height:"100vh",position:"sticky",top:0,overflow:"hidden",...SANS}}>
      {/* Logo + toggle */}
      <div style={{padding:"16px 12px 12px",display:"flex",alignItems:"center",justifyContent:col?"center":"space-between"}}>
        {!col&&(
          <div style={{display:"flex",alignItems:"center",gap:9}}>
            <div style={{width:30,height:30,borderRadius:9,background:BLUE,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <span className="mso mso-fill" style={{fontSize:15,color:"white"}}>radar</span>
            </div>
            <div>
              <span style={{fontWeight:800,fontSize:15,color:"#0f172a",letterSpacing:-0.3}}>Orbit</span>
              <p style={{fontSize:8,fontWeight:700,letterSpacing:"0.12em",color:"#cbd5e1",textTransform:"uppercase",marginTop:1}}>Project Intelligence</p>
            </div>
          </div>
        )}
        {col&&(
          <div style={{width:30,height:30,borderRadius:9,background:BLUE,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <span className="mso mso-fill" style={{fontSize:15,color:"white"}}>radar</span>
          </div>
        )}
        <button onClick={()=>setCol(!col)}
          style={{width:26,height:26,borderRadius:7,background:"#f8fafc",border:"1px solid #e2e8f0",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#94a3b8",flexShrink:0,marginLeft:col?0:8}}
          onMouseEnter={e=>{e.currentTarget.style.background="#f1f5f9";}}
          onMouseLeave={e=>{e.currentTarget.style.background="#f8fafc";}}>
          <span className="mso" style={{fontSize:15}}>{col?"chevron_right":"chevron_left"}</span>
        </button>
      </div>
      <div style={{borderBottom:"1px solid #f1f5f9"}}/>

      {/* Nav */}
      <nav style={{padding:"10px 8px",flex:1,overflowY:"auto",overflowX:"hidden"}}>
        <div style={{display:"flex",flexDirection:"column",gap:2}}>
          {NAV.map(n=>{
            const active=page===n.id;
            return(
              <button key={n.id} onClick={()=>setPage(n.id)}
                title={col?n.label:""}
                style={{display:"flex",alignItems:"center",gap:col?0:9,padding:col?"9px":"8px 11px",borderRadius:11,border:"none",cursor:"pointer",textAlign:"left",background:active?BLUE:"transparent",color:active?"white":"#94a3b8",width:"100%",transition:"all 0.15s",...SANS,justifyContent:col?"center":"flex-start"}}
                onMouseEnter={e=>{if(!active){e.currentTarget.style.background="#f8fafc";e.currentTarget.style.color="#475569";}}}
                onMouseLeave={e=>{if(!active){e.currentTarget.style.background="transparent";e.currentTarget.style.color="#94a3b8";}}}>
                <span className="mso" style={{fontSize:18,flexShrink:0}}>{n.icon}</span>
                {!col&&<span style={{fontSize:13,fontWeight:active?700:500,flex:1}}>{n.label}</span>}
                {!col&&n.badge&&<span style={{background:active?"rgba(255,255,255,0.25)":"#137fec",color:"white",fontSize:9,fontWeight:700,borderRadius:99,padding:"1px 6px"}}>{n.badge}</span>}
              </button>
            );
          })}
        </div>

        {!col&&(
          <>
            <div style={{borderBottom:"1px solid #f1f5f9",margin:"12px 0"}}/>
            <p style={{fontSize:9,fontWeight:700,letterSpacing:"0.1em",color:"#cbd5e1",textTransform:"uppercase",marginBottom:8,paddingLeft:4}}>Clients</p>
            {CLIENTS_LIST.map(c=>(
              <div key={c.name} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 11px",borderRadius:8,cursor:"pointer"}}
                onMouseEnter={e=>e.currentTarget.style.background="#f8fafc"}
                onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                <div style={{width:7,height:7,borderRadius:"50%",background:c.dot,flexShrink:0}}/>
                <span style={{fontSize:11,color:"#64748b",fontWeight:500}}>{c.name}</span>
              </div>
            ))}
          </>
        )}
      </nav>

      {/* User */}
      <div style={{borderTop:"1px solid #f1f5f9",padding:"12px 10px"}}>
        {col?(
          <div style={{display:"flex",justifyContent:"center"}}>
            <div style={{width:32,height:32,borderRadius:"50%",background:"#f1f5f9",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,color:"#64748b"}}>SR</div>
          </div>
        ):(
          <div style={{display:"flex",alignItems:"center",gap:9}}>
            <div style={{width:32,height:32,borderRadius:"50%",background:"#f1f5f9",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,color:"#64748b",flexShrink:0}}>SR</div>
            <div>
              <p style={{fontSize:12,fontWeight:700,color:"#0f172a"}}>Sarah R.</p>
              <p style={{fontSize:10,color:"#94a3b8",fontWeight:500}}>Product Lead</p>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function TopNav({page}){
  return(
    <div style={{height:56,background:"white",borderBottom:"1px solid #e2e8f0",display:"flex",alignItems:"center",padding:"0 24px",gap:16,flexShrink:0,...SANS}}>
      <h1 style={{fontSize:14,fontWeight:800,color:"#0f172a",letterSpacing:-0.3,width:120,flexShrink:0}}>{TITLES[page]}</h1>
      <div style={{flex:1,maxWidth:360,display:"flex",alignItems:"center",height:36,borderRadius:12,background:"#f1f5f9",overflow:"hidden"}}>
        <span className="mso" style={{fontSize:18,color:"#94a3b8",padding:"0 8px 0 12px"}}>search</span>
        <input placeholder="Search projects, tasks…" style={{flex:1,background:"transparent",border:"none",outline:"none",fontSize:13,color:"#0f172a",...SANS,paddingRight:12}}/>
      </div>
      <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}}>
        {["notifications","settings"].map(icon=>(
          <button key={icon} style={{width:36,height:36,borderRadius:10,background:"#f1f5f9",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#64748b"}}
            onMouseEnter={e=>e.currentTarget.style.background="#e2e8f0"}
            onMouseLeave={e=>e.currentTarget.style.background="#f1f5f9"}>
            <span className="mso" style={{fontSize:20}}>{icon}</span>
          </button>
        ))}
        <div style={{width:1,height:28,background:"#e2e8f0",margin:"0 4px"}}/>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end"}}>
          <span style={{fontSize:12,fontWeight:700,color:"#0f172a"}}>Sarah R.</span>
          <span style={{fontSize:10,color:"#94a3b8",fontWeight:500}}>Product Lead</span>
        </div>
        <div style={{width:36,height:36,borderRadius:"50%",background:"#e2e8f0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:"#64748b",border:"2px solid white",boxShadow:"0 0 0 2px #e2e8f0"}}>SR</div>
        <div style={{width:1,height:28,background:"#e2e8f0",margin:"0 4px"}}/>
        <button style={{height:34,padding:"0 14px",borderRadius:10,background:BLUE,border:"none",color:"white",fontSize:12,fontWeight:700,cursor:"pointer",...SANS,whiteSpace:"nowrap"}}
          onMouseEnter={e=>e.currentTarget.style.opacity="0.9"}
          onMouseLeave={e=>e.currentTarget.style.opacity="1"}>
          + New Project
        </button>
      </div>
    </div>
  );
}

function App(){
  const[page,setPage]=useState("overview");
  const pages={
    overview:<OverviewPage/>,
    clients:<ClientsPage/>,
    automation:<AutomationPage/>,
    workload:<WorkloadPage/>,
    revenue:<RevenuePage/>,
    feedback:<FeedbackPage/>,
  };
  return(
    <div style={{display:"flex",height:"100vh",overflow:"hidden",...SANS}}>
      <Sidebar page={page} setPage={setPage}/>
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",background:"#f8fafc"}}>
        <TopNav page={page}/>
        <div style={{flex:1,overflowY:"auto"}}>
          {pages[page]}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
