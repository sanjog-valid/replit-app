<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Orbit — Project Intelligence</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.10.3/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Manrope',sans-serif;background:#d5dde8}
    .mso{font-family:'Material Symbols Outlined';font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;font-style:normal;display:inline-flex;align-items:center;line-height:1;user-select:none}
    .mso-fill{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:4px}
    .canvas-grid{background-size:24px 24px;background-image:radial-gradient(circle,#e2e8f0 1px,transparent 1px)}
    .cell-over{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:#b91c1c}
    .cell-ok{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.3);color:#15803d}
    .cell-under{background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.25);color:#92400e}
    .cell-off{background:#f8fafc;border-color:#e2e8f0;color:#cbd5e1}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .spin{animation:spin 1s linear infinite;display:inline-block}
    .pulse{animation:pulse 2s ease-in-out infinite}
    .sidebar-transition{transition:width .2s cubic-bezier(.4,0,.2,1)}
    .heatcell{min-height:60px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState } = React;
const {
  AreaChart, Area, BarChart, Bar, LineChart, Line,
  XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer,
  PieChart, Pie, Cell,
} = Recharts;

/* ── TOKENS ─────────────────────────────────────────────────────────────── */
const BLUE    = "#137fec";
const BLUEbg  = "#eff6ff";
const BLUElt  = "#93c5fd";
const TRACK   = "#e2e8f0";
const MONO    = {fontFamily:"'DM Mono',monospace"};
const SANS    = {fontFamily:"'Manrope',sans-serif"};
const capFill = p => p>=85?"#ef4444":p>=70?"#d97706":BLUE;

/* ── DATA (keys match orbit-dashboard.jsx exactly) ───────────────────────── */
const revenueData = [
  {month:"Oct",revenue:41200,projected:38000},
  {month:"Nov",revenue:52800,projected:48000},
  {month:"Dec",revenue:47300,projected:50000},
  {month:"Jan",revenue:61400,projected:58000},
  {month:"Feb",revenue:74200,projected:70000},
  {month:"Mar",revenue:84200,projected:78000},
];
const weeklyData = [
  {day:"Mon",tasks:14,completed:11},
  {day:"Tue",tasks:18,completed:16},
  {day:"Wed",tasks:12,completed:9},
  {day:"Thu",tasks:22,completed:19},
  {day:"Fri",tasks:16,completed:16},
  {day:"Sat",tasks:4,completed:4},
  {day:"Sun",tasks:2,completed:2},
];
const automationData = [
  {week:"W1",auto:142},{week:"W2",auto:178},
  {week:"W3",auto:201},{week:"W4",auto:247},
];
const workloadData = [
  {name:"Marcus D.",capacity:95,tasks:11,initials:"MD",blocked:3},
  {name:"Jamie L.", capacity:62,tasks:7, initials:"JL",blocked:0},
  {name:"Sarah R.", capacity:44,tasks:5, initials:"SR",blocked:0},
  {name:"Priya K.", capacity:31,tasks:4, initials:"PK",blocked:0},
  {name:"Theo M.",  capacity:78,tasks:9, initials:"TM",blocked:1},
];
const clientRevData = [
  {client:"Meridian",contracted:18400,collected:18400},
  {client:"Luma",    contracted:32000,collected:24000},
  {client:"Fold",    contracted:9500, collected:9500},
  {client:"Hartwell",contracted:14200,collected:10500},
  {client:"Prism",   contracted:28000,collected:21800},
];
const pieData = [
  {name:"Shipping", value:1,color:"#93c5fd"},
  {name:"Building", value:2,color:BLUE},
  {name:"In Review",value:1,color:"#94a3b8"},
  {name:"Blocked",  value:1,color:"#fca5a5"},
];
const projects = [
  {name:"Dashboard Redesign",   client:"Meridian Co.", status:"Shipping", progress:88,trend:"+12%"},
  {name:"Patient Portal v2",    client:"Luma Health",  status:"Building", progress:61,trend:"+8%"},
  {name:"Brand Identity System",client:"Fold Studio",  status:"In Review",progress:75,trend:"—"},
  {name:"API Integration",      client:"Hartwell Inc.",status:"Blocked",  progress:42,trend:"-4%"},
  {name:"ML Inference Pipeline",client:"Prism Labs",   status:"Building", progress:29,trend:"+21%"},
];
const feedbackItems = [
  {id:1,client:"Meridian Co.", priority:"High",  time:"2h ago",raw:"Make it feel less corporate and more like a tool I want to use every day",parsed:["Increase visual warmth in UI","Reduce density on main view","Add microinteraction on task complete"]},
  {id:2,client:"Luma Health",  priority:"Medium",time:"5h ago",raw:"The weekly report takes too long to generate, can we speed it up?",parsed:["Optimize report query < 2s","Add skeleton loading state","Cache previous week data"]},
  {id:3,client:"Hartwell Inc.",priority:"High",  time:"1d ago",raw:"We need to track who approved what and when for compliance",parsed:["Audit trail on all approvals","Timestamp + user attribution","Export audit log as CSV"]},
];
const SC = {
  "Shipping": {dot:"#22c55e",pill:"bg-slate-50 text-slate-600 border-slate-200"},
  "Building": {dot:BLUE,    pill:"bg-slate-50 text-slate-600 border-slate-200"},
  "In Review":{dot:"#d97706",pill:"bg-slate-50 text-slate-600 border-slate-200"},
  "Blocked":  {dot:"#ef4444",pill:"bg-red-50 text-red-700 border-red-100"},
};

/* ── TOOLTIP (copied from orbit-dashboard.jsx) ───────────────────────────── */
const Tip = ({active,payload,label}) => {
  if(!active||!payload?.length)return null;
  return(
    <div style={SANS} className="bg-white border border-slate-200 rounded-xl px-3 py-2.5 shadow-xl text-xs">
      {label&&<p className="font-bold text-slate-400 mb-1.5 text-[9px] uppercase tracking-wider">{label}</p>}
      {payload.map((p,i)=>(
        <p key={i} style={{color:p.stroke||p.fill||BLUE}} className="font-semibold text-[11px]">
          {p.name}: {typeof p.value==="number"&&p.value>999?"$"+(p.value/1000).toFixed(1)+"k":p.value}
        </p>
      ))}
    </div>
  );
};

/* ── PRIMITIVES ──────────────────────────────────────────────────────────── */
const Card=({children,className=""})=>(
  <div className={"bg-white rounded-2xl "+className} style={{border:"1px solid rgba(255,255,255,0.8)",boxShadow:"0 4px 16px rgba(0,0,0,0.08),0 1px 4px rgba(0,0,0,0.05)"}}>{children}</div>
);
const CH=({title,desc,right})=>(
  <div className="flex items-start justify-between px-6 pt-5 pb-4">
    <div>
      <p className="text-[13px] font-bold text-slate-800 leading-none mb-1">{title}</p>
      {desc&&<p className="text-[11px] text-slate-500 font-medium">{desc}</p>}
    </div>
    {right&&<div className="flex-shrink-0 ml-4">{right}</div>}
  </div>
);
const Divider=()=><div className="border-b border-slate-50"/>;
const Hr=()=><div className="border-b border-slate-100"/>;

function Toggle({on}){
  const[checked,setChecked]=useState(on);
  return(
    <button onClick={()=>setChecked(!checked)}
      style={{width:44,height:24,borderRadius:99,background:checked?BLUE:"#e2e8f0",border:"none",cursor:"pointer",position:"relative",transition:"background .2s",flexShrink:0}}>
      <span style={{position:"absolute",top:2,left:checked?20:2,width:20,height:20,borderRadius:"50%",background:"white",boxShadow:"0 1px 3px rgba(0,0,0,.2)",transition:"left .2s"}}/>
    </button>
  );
}

/* ── MC — metric card (exact copy from orbit-dashboard.jsx, BLUE substituted) */
const MC=({label,value,delta,sub,chartData,chartKey,chartColor})=>{
  const pos=delta?.startsWith("+");
  const neutral=!delta||delta==="—"||delta==="-";
  return(
    <Card>
      <div className="pt-5 pb-4 px-5">
        <div className="flex items-start justify-between mb-3">
          <p className="text-[9px] font-black text-slate-500 tracking-widest uppercase leading-none">{label}</p>
          {delta&&(
            <span className={"text-[9px] font-bold px-1.5 py-0.5 rounded-md leading-none "+(neutral?"bg-slate-100 text-slate-400":pos?"text-blue-700 bg-blue-50":"text-red-600 bg-red-50")}>
              {delta}
            </span>
          )}
        </div>
        <p className="text-[28px] font-extrabold text-slate-900 leading-none tracking-tight mb-1" style={MONO}>{value}</p>
        {sub&&<p className="text-[10px] text-slate-500 font-medium">{sub}</p>}
        {chartData&&(
          <div className="mt-3 -mx-1">
            <ResponsiveContainer width="100%" height={34}>
              <AreaChart data={chartData} margin={{top:2,right:0,bottom:0,left:0}}>
                <defs>
                  <linearGradient id={"g"+label.replace(/\s/g,"")} x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%"   stopColor={chartColor||BLUE} stopOpacity={0.15}/>
                    <stop offset="100%" stopColor={chartColor||BLUE} stopOpacity={0}/>
                  </linearGradient>
                </defs>
                <Area type="monotone" dataKey={chartKey} stroke={chartColor||BLUE} strokeWidth={1.8}
                  fill={"url(#g"+label.replace(/\s/g,"")+")"}  dot={false}/>
              </AreaChart>
            </ResponsiveContainer>
          </div>
        )}
      </div>
    </Card>
  );
};

function Tabs({tabs,active,setActive}){
  return(
    <div className="flex border-b border-slate-200 px-6 gap-6">
      {tabs.map(t=>(
        <button key={t.id} onClick={()=>setActive(t.id)}
          className="py-3 text-sm font-semibold transition-colors relative"
          style={{color:active===t.id?BLUE:"#94a3b8",border:"none",background:"none",cursor:"pointer"}}>
          {t.label}
          {active===t.id&&<span style={{position:"absolute",bottom:0,left:0,right:0,height:2,background:BLUE,borderRadius:2}}/>}
        </button>
      ))}
    </div>
  );
}

/* ── PAGE: OVERVIEW (charts from orbit-dashboard.jsx, BLUE substituted) ─── */
function OverviewPage(){
  return(
    <div className="px-7 py-6 space-y-5">
      <div className="grid grid-cols-4 gap-4">
        <MC label="Revenue MTD"     value="$84.2k" delta="+18%" sub="vs $71.4k last month"  chartData={revenueData}    chartKey="revenue" chartColor={BLUE}/>
        <MC label="Active Projects" value="6"      delta="+2"   sub="across 5 clients"       chartData={weeklyData}     chartKey="tasks"   chartColor="#22c55e"/>
        <MC label="Tasks Automated" value="247"    delta="+28%" sub="this week"              chartData={automationData} chartKey="auto"    chartColor="#8b5cf6"/>
        <MC label="Bottlenecks"     value="2"      delta="-"    sub="flagged today"           chartData={[{v:1},{v:1},{v:3},{v:2},{v:2},{v:2}]} chartKey="v" chartColor="#ef4444"/>
      </div>

      <div className="grid grid-cols-3 gap-4">
        <Card className="col-span-2">
          <CH title="Revenue Overview" desc="Actual vs projected — last 6 months"
            right={
              <div className="flex items-center gap-4 text-[9px] font-bold text-slate-400 uppercase tracking-wider">
                <span className="flex items-center gap-1.5"><span className="w-3 h-0.5 rounded-full inline-block" style={{background:BLUE}}/>Actual</span>
                <span className="flex items-center gap-1.5"><span className="w-3 h-0.5 rounded-full inline-block bg-slate-200"/>Projected</span>
              </div>
            }
          />
          <Divider/>
          <div className="px-4 pb-5 pt-3">
            <ResponsiveContainer width="100%" height={190}>
              <AreaChart data={revenueData} margin={{top:8,right:4,bottom:0,left:-14}}>
                <defs>
                  <linearGradient id="revG" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%"   stopColor={BLUE}     stopOpacity={0.12}/>
                    <stop offset="100%" stopColor={BLUE}     stopOpacity={0}/>
                  </linearGradient>
                  <linearGradient id="projG" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%"   stopColor="#94a3b8" stopOpacity={0.07}/>
                    <stop offset="100%" stopColor="#94a3b8" stopOpacity={0}/>
                  </linearGradient>
                </defs>
                <CartesianGrid strokeDasharray="3 3" stroke="#e8edf3" vertical={false}/>
                <XAxis dataKey="month" tick={{fontSize:10,fill:"#64748b",fontFamily:"Manrope"}} axisLine={false} tickLine={false}/>
                <YAxis tick={{fontSize:10,fill:"#64748b",fontFamily:"Manrope"}} axisLine={false} tickLine={false} tickFormatter={v=>`$${v/1000}k`}/>
                <Tooltip content={<Tip/>}/>
                <Area type="monotone" dataKey="projected" name="Projected" stroke="#cbd5e1" strokeWidth={1.5} strokeDasharray="5 3" fill="url(#projG)" dot={false}/>
                <Area type="monotone" dataKey="revenue"   name="Revenue"   stroke={BLUE}    strokeWidth={2.5} fill="url(#revG)"
                  dot={{r:3.5,fill:BLUE,strokeWidth:2,stroke:"white"}}
                  activeDot={{r:5,fill:BLUE,strokeWidth:2,stroke:"white"}}/>
              </AreaChart>
            </ResponsiveContainer>
          </div>
        </Card>

        <Card>
          <CH title="Project Status" desc="Current distribution"/>
          <Divider/>
          <div className="flex flex-col items-center px-4 pb-5 pt-3">
            <ResponsiveContainer width="100%" height={148}>
              <PieChart>
                <Pie data={pieData} cx="50%" cy="50%" innerRadius={44} outerRadius={66} paddingAngle={3} dataKey="value" strokeWidth={0}>
                  {pieData.map((e,i)=><Cell key={i} fill={e.color}/>)}
                </Pie>
                <Tooltip content={<Tip/>}/>
              </PieChart>
            </ResponsiveContainer>
            <div className="grid grid-cols-2 gap-x-6 gap-y-2 w-full">
              {pieData.map((d,i)=>(
                <div key={i} className="flex items-center gap-2">
                  <span className="w-2 h-2 rounded-sm flex-shrink-0" style={{background:d.color}}/>
                  <span className="text-[10px] font-semibold text-slate-500">{d.name}</span>
                </div>
              ))}
            </div>
          </div>
        </Card>
      </div>

      <div className="grid grid-cols-2 gap-4">
        <Card>
          <CH title="Active Projects" desc="All client work this cycle"
            right={<button className="text-[11px] font-semibold text-slate-500 border border-slate-200 rounded-lg px-3 py-1.5 hover:bg-slate-50 transition-colors">Export ↗</button>}
          />
          <Divider/>
          <div className="grid grid-cols-12 px-6 py-2 text-[8px] font-black tracking-widest uppercase text-slate-300">
            <div className="col-span-5">Project</div><div className="col-span-3">Status</div><div className="col-span-4">Progress</div>
          </div>
          <Divider/>
          {projects.map((p,i)=>{
            const sc=SC[p.status];
            return(
              <div key={i}>
                <div className="grid grid-cols-12 px-6 py-3.5 items-center hover:bg-slate-50/70 transition-colors cursor-pointer group">
                  <div className="col-span-5">
                    <p className="text-[12px] font-semibold text-slate-800 group-hover:text-blue-600 transition-colors leading-snug">{p.name}</p>
                    <p className="text-[9px] text-slate-400 font-semibold mt-0.5" style={MONO}>{p.client}</p>
                  </div>
                  <div className="col-span-3">
                    <span className={"inline-flex items-center gap-1.5 text-[9px] font-bold px-2 py-1 rounded-md border "+sc.pill}>
                      <span className="w-1.5 h-1.5 rounded-full flex-shrink-0" style={{background:sc.dot}}/>{p.status}
                    </span>
                  </div>
                  <div className="col-span-4 pr-2">
                    <div className="flex items-center justify-between mb-1.5">
                      <span className="text-[9px] font-bold text-slate-400" style={MONO}>{p.progress}%</span>
                      <span className={"text-[8px] font-black "+(p.trend.startsWith("+")?"text-slate-400":p.trend==="—"?"text-slate-300":"text-red-400")}>{p.trend}</span>
                    </div>
                    <div className="h-1.5 rounded-full overflow-hidden" style={{background:TRACK}}>
                      <div className="h-full rounded-full" style={{width:p.progress+"%",background:p.status==="Blocked"?"#ef4444":BLUE,opacity:p.status==="Blocked"?0.7:1}}/>
                    </div>
                  </div>
                </div>
                {i<projects.length-1&&<Divider/>}
              </div>
            );
          })}
        </Card>

        <Card>
          <CH title="Feedback Inbox" desc="Auto-parsed into dev requirements"
            right={<span className="w-6 h-6 rounded-md flex items-center justify-center text-[10px] font-black text-white" style={{background:BLUE}}>3</span>}
          />
          <Divider/>
          {feedbackItems.map((f,i)=>(
            <div key={f.id}>
              <div className="px-6 py-3.5 hover:bg-slate-50/70 transition-colors cursor-pointer">
                <div className="flex items-center justify-between mb-2">
                  <div className="flex items-center gap-1.5">
                    <span className="text-[8px] font-black px-2 py-0.5 rounded-md bg-slate-100 text-slate-500 border border-slate-200">{f.client}</span>
                    <span className={"text-[8px] font-black px-2 py-0.5 rounded-md border "+(f.priority==="High"?"bg-red-50 text-red-500 border-red-100":"bg-slate-50 text-slate-500 border-slate-200")}>{f.priority}</span>
                  </div>
                  <span className="text-[9px] text-slate-400 font-medium">{f.time}</span>
                </div>
                <p className="text-[11px] text-slate-500 italic mb-2 leading-snug">"{f.raw}"</p>
                <div className="space-y-1">
                  {f.parsed.map((r,j)=>(
                    <div key={j} className="flex items-center gap-1.5">
                      <span className="w-1 h-1 rounded-full flex-shrink-0" style={{background:BLUE}}/>
                      <span className="text-[10px] text-slate-600 font-semibold">{r}</span>
                    </div>
                  ))}
                </div>
              </div>
              {i<feedbackItems.length-1&&<Divider/>}
            </div>
          ))}
        </Card>
      </div>
    </div>
  );
}

/* ── PAGE: CLIENTS ───────────────────────────────────────────────────────── */
function ClientsPage(){
  const healthRows=[
    {name:"Dashboard Redesign",sub:"Meridian Co.",icon:"api",iconCls:"text-blue-500 bg-blue-50",health:4,label:"Stable",hcls:"text-emerald-500",tl:"Sep 12 – Oct 30",pct:75,sBg:"bg-blue-50 text-blue-600 border-blue-200",sLabel:"IN PROGRESS"},
    {name:"Patient Portal v2",sub:"Luma Health",icon:"auto_stories",iconCls:"text-emerald-500 bg-emerald-50",health:5,label:"Excellent",hcls:"text-emerald-500",tl:"Aug 20 – Sep 30",pct:100,sBg:"bg-emerald-50 text-emerald-600 border-emerald-200",sLabel:"COMPLETED"},
    {name:"Brand Identity",sub:"Fold Studio",icon:"palette",iconCls:"text-purple-500 bg-purple-50",health:3,label:"Stable",hcls:"text-emerald-500",tl:"Nov 1 – Jan 15",pct:60,sBg:"bg-blue-50 text-blue-600 border-blue-200",sLabel:"IN PROGRESS"},
    {name:"API Integration",sub:"Hartwell Inc.",icon:"warning",iconCls:"text-amber-500 bg-amber-50",health:2,label:"Warning",hcls:"text-amber-500",tl:"Oct 1 – Dec 15",pct:25,sBg:"bg-amber-50 text-amber-600 border-amber-200",sLabel:"AT RISK"},
  ];
  const activity=[
    {dot:BLUE,text:"Sarah M. updated ",bold:"Branding Specs",time:"2 hours ago"},
    {dot:"#22c55e",text:"Invoice ",bold:"#INV-2024-01 paid",time:"5 hours ago"},
    {dot:"#8b5cf6",text:"New member ",bold:"David Chen joined",time:"Yesterday"},
    {dot:"#d97706",text:"API Integration flagged ",bold:"Blocked",time:"2 days ago"},
  ];
  const docs=[
    {icon:"picture_as_pdf",icls:"text-red-500 bg-red-50",name:"NDA_Agreement.pdf",meta:"2d ago • 2.4 MB"},
    {icon:"description",icls:"text-blue-500 bg-blue-50",name:"Project_Brief_v2.docx",meta:"5d ago • 1.1 MB"},
    {icon:"article",icls:"text-orange-500 bg-orange-50",name:"Invoices_Q3.zip",meta:"1w ago • 15.8 MB"},
    {icon:"add_circle",icls:"text-slate-400 bg-slate-50",name:"Upload New",meta:null,dash:true},
  ];
  return(
    <div className="px-7 py-6 space-y-5">
      <div className="grid grid-cols-3 gap-5">
        {[
          {icon:"account_tree",label:"Total Projects",value:"24",delta:"+4%",pos:true,extra:<div className="mt-4 flex -space-x-2">{["MD","JL","SR"].map((ini,j)=><div key={j} className="w-8 h-8 rounded-full border-2 border-white bg-slate-200 flex items-center justify-center text-[10px] font-black text-slate-500">{ini}</div>)}<div className="w-8 h-8 rounded-full border-2 border-white bg-slate-800 flex items-center justify-center text-[10px] font-bold text-slate-400">+9</div></div>},
          {icon:"task_alt",label:"Active Tasks",value:"48",delta:"+12%",pos:true,extra:<div className="mt-4 w-full bg-slate-100 h-1.5 rounded-full overflow-hidden"><div className="h-full rounded-full" style={{width:"65%",background:BLUE}}/></div>},
          {icon:"schedule",label:"Hours Logged",value:"1,240h",delta:"-3%",pos:false,extra:<p className="mt-4 text-xs text-slate-400">Total capacity: 84%</p>},
        ].map((s,i)=>(
          <Card key={i} className="relative group">
            <div className="p-6">
              <div className="absolute top-0 right-0 p-4 opacity-5 group-hover:opacity-10 transition-opacity pointer-events-none">
                <span className="mso" style={{fontSize:64,color:"#94a3b8"}}>{s.icon}</span>
              </div>

/* ── PAGE: FEEDBACK ──────────────────────────────────────────────────────── */
function FeedbackPage(){
  const[text,setText]=useState("");
  const[loading,setLoading]=useState(false);
  const[parsed,setParsed]=useState(null);
  const go=()=>{
    if(!text.trim())return;
    setLoading(true);setParsed(null);
    setTimeout(()=>{setLoading(false);setParsed(["Extract key action items from feedback","Assign priority by client tier","Route to relevant project backlog","Generate summary for weekly standup"]);},1400);
  };
  return(
    <div className="px-7 py-6 space-y-5">
      <Card>
        <div className="flex items-start justify-between px-6 pt-5 pb-4">
          <div>
            <p className="text-[13px] font-bold text-slate-800 leading-none mb-1">Submit Feedback</p>
            <p className="text-[11px] text-slate-400 font-medium mt-0.5">Paste raw client feedback — AI extracts action items</p>
          </div>
          <div className="flex items-center gap-1.5 px-2.5 py-1 rounded-full border" style={{background:BLUEbg,borderColor:BLUElt+"88"}}>
            <span className="pulse w-1.5 h-1.5 rounded-full inline-block" style={{background:BLUE}}/>
            <span className="text-[10px] font-bold" style={{color:BLUE}}>AI-Parsed</span>
          </div>
        </div>
        <Hr/>
        <div className="px-6 py-4 space-y-3">
          <textarea value={text} onChange={e=>{setText(e.target.value);setParsed(null);}} placeholder="Paste client feedback here…" rows={3}
            style={{...SANS,width:"100%",padding:"12px 14px",borderRadius:12,border:"1px solid #e2e8f0",fontSize:12,color:"#0f172a",background:"#f8fafc",outline:"none",resize:"vertical",lineHeight:1.6}}
            onFocus={e=>e.target.style.borderColor=BLUE} onBlur={e=>e.target.style.borderColor="#e2e8f0"}/>
          <div className="flex items-center gap-3">
            <select className="flex-1 text-[12px] border border-slate-200 rounded-xl px-3 py-2.5 text-slate-700 outline-none bg-white font-medium" style={SANS}>
              {projects.map(p=><option key={p.name}>{p.name} — {p.client}</option>)}
            </select>
            <button onClick={go} disabled={loading||!text.trim()} className="flex items-center gap-2 px-5 py-2.5 rounded-xl text-white text-sm font-bold flex-shrink-0" style={{background:(!text.trim()||loading)?"#93c5fd":BLUE,cursor:(!text.trim()||loading)?"not-allowed":"pointer",...SANS}}>
              {loading?<><span className="spin w-4 h-4 border-2 border-white border-t-transparent rounded-full"/>Parsing…</>:<>Parse &amp; Submit →</>}
            </button>
          </div>
          {parsed&&(
            <div className="p-4 rounded-xl border" style={{background:BLUEbg,borderColor:BLUElt+"66"}}>
              <p className="text-[9px] font-black uppercase tracking-widest mb-3" style={{color:BLUElt}}>Extracted Requirements</p>
              <ul className="space-y-2">{parsed.map((r,i)=><li key={i} className="flex items-start gap-2"><span className="font-black text-sm flex-shrink-0 mt-0.5" style={{color:BLUE}}>✓</span><span className="text-[12px] text-slate-700 font-medium">{r}</span></li>)}</ul>
            </div>
          )}
        </div>
      </Card>
      <Card>
        <CH title="Feedback Inbox" desc="All parsed client feedback — last 7 days"
          right={<div className="flex items-center gap-2"><span className="text-[9px] font-bold px-2.5 py-1 rounded-full bg-red-50 text-red-500">2 High Priority</span><button className="px-3 py-1.5 rounded-lg border border-slate-200 text-xs font-semibold text-slate-500 hover:bg-slate-50">Filter</button></div>}

                <p className="text-[9px] font-black uppercase tracking-widest text-slate-400 mb-2">AI-Extracted Actions</p>
                <ul className="space-y-1.5">{f.parsed.map((r,j)=><li key={j} className="flex items-start gap-2"><span className="font-bold flex-shrink-0" style={{color:BLUE,fontSize:13,lineHeight:"1.3"}}>›</span><span className="text-[11px] text-slate-600 font-medium">{r}</span></li>)}</ul>
              </div>
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
}

/* ── SHELL ───────────────────────────────────────────────────────────────── */
const NAV=[
  {id:"overview",  icon:"grid_view",       label:"Overview"},
  {id:"clients",   icon:"business_center", label:"Clients"},
  {id:"automation",icon:"auto_fix_high",   label:"Automation"},
  {id:"workload",  icon:"calendar_today",  label:"Workload"},
  {id:"revenue",   icon:"payments",        label:"Revenue"},
  {id:"feedback",  icon:"forum",           label:"Feedback",badge:"3"},
];
const CLIENTS_LIST=[
  {name:"Meridian Co.",dot:BLUE},
  {name:"Luma Health",dot:"#22c55e"},
  {name:"Fold Studio",dot:"#a855f7"},
  {name:"Hartwell Inc.",dot:"#f59e0b"},
  {name:"Prism Labs",dot:"#ef4444"},
];
const TITLES={overview:"Dashboard",clients:"Clients",automation:"Automation",workload:"Workload",revenue:"Revenue",feedback:"Feedback"};

function Sidebar({page,setPage}){
  const[col,setCol]=useState(false);
  const w=col?52:224;
  return(
    <div className="sidebar-transition" style={{width:w,flexShrink:0,background:"white",borderRight:"1px solid #e2e8f0",display:"flex",flexDirection:"column",height:"100vh",position:"sticky",top:0,overflow:"hidden",...SANS}}>
      <div style={{padding:"16px 10px 12px",display:"flex",flexDirection:col?"column":"row",alignItems:"center",justifyContent:col?"center":"space-between",gap:col?8:0}}>
        {col?(
          <>
            <button onClick={()=>setCol(!col)} style={{width:26,height:26,borderRadius:7,background:"#f8fafc",border:"1px solid #e2e8f0",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#94a3b8",flexShrink:0}}
              onMouseEnter={e=>e.currentTarget.style.background="#f1f5f9"}
              onMouseLeave={e=>e.currentTarget.style.background="#f8fafc"}>
              <span className="mso" style={{fontSize:15}}>chevron_right</span>
            </button>
            <div style={{width:30,height:30,borderRadius:9,background:BLUE,display:"flex",alignItems:"center",justifyContent:"center"}}><span className="mso mso-fill" style={{fontSize:15,color:"white"}}>radar</span></div>
          </>
        ):(
          <>
            <div style={{display:"flex",alignItems:"center",gap:9}}>
              <div style={{width:30,height:30,borderRadius:9,background:BLUE,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <span className="mso mso-fill" style={{fontSize:15,color:"white"}}>radar</span>
              </div>
              <div>
                <span style={{fontWeight:800,fontSize:15,color:"#0f172a",letterSpacing:-0.3}}>Orbit</span>
                <p style={{fontSize:8,fontWeight:700,letterSpacing:"0.12em",color:"#cbd5e1",textTransform:"uppercase",marginTop:1}}>Project Intelligence</p>
              </div>
            </div>
            <button onClick={()=>setCol(!col)} style={{width:26,height:26,borderRadius:7,background:"#f8fafc",border:"1px solid #e2e8f0",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#94a3b8",flexShrink:0,marginLeft:8}}
              onMouseEnter={e=>e.currentTarget.style.background="#f1f5f9"}
              onMouseLeave={e=>e.currentTarget.style.background="#f8fafc"}>
              <span className="mso" style={{fontSize:15}}>chevron_left</span>
            </button>
          </>
        )}
      </div>
      <div style={{borderBottom:"1px solid #f1f5f9"}}/>
      <nav style={{padding:"10px 8px",flex:1,overflowY:"auto",overflowX:"hidden"}}>
        <div style={{display:"flex",flexDirection:"column",gap:2}}>
          {NAV.map(n=>{
            const active=page===n.id;
            return(
              <button key={n.id} onClick={()=>setPage(n.id)} title={col?n.label:""}
                style={{display:"flex",alignItems:"center",gap:col?0:9,padding:col?"9px":"8px 11px",borderRadius:11,border:"none",cursor:"pointer",textAlign:"left",background:active?BLUE:"transparent",color:active?"white":"#94a3b8",width:"100%",transition:"all 0.15s",...SANS,justifyContent:col?"center":"flex-start"}}
                onMouseEnter={e=>{if(!active){e.currentTarget.style.background="#f8fafc";e.currentTarget.style.color="#475569";}}}
                onMouseLeave={e=>{if(!active){e.currentTarget.style.background="transparent";e.currentTarget.style.color="#94a3b8";}}}>
                <span className="mso" style={{fontSize:18,flexShrink:0}}>{n.icon}</span>
                {!col&&<span style={{fontSize:13,fontWeight:active?700:500,flex:1}}>{n.label}</span>}
                {!col&&n.badge&&<span style={{background:active?"rgba(255,255,255,0.25)":"#137fec",color:"white",fontSize:9,fontWeight:700,borderRadius:99,padding:"1px 6px"}}>{n.badge}</span>}
              </button>
            );
          })}
        </div>
        {!col&&(
          <>
            <div style={{borderBottom:"1px solid #f1f5f9",margin:"12px 0"}}/>
            <p style={{fontSize:9,fontWeight:700,letterSpacing:"0.1em",color:"#cbd5e1",textTransform:"uppercase",marginBottom:8,paddingLeft:4}}>Clients</p>
            {CLIENTS_LIST.map(c=>(
              <div key={c.name} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 11px",borderRadius:8,cursor:"pointer"}}
                onMouseEnter={e=>e.currentTarget.style.background="#f8fafc"}
                onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                <div style={{width:7,height:7,borderRadius:"50%",background:c.dot,flexShrink:0}}/>
                <span style={{fontSize:11,color:"#64748b",fontWeight:500}}>{c.name}</span>
              </div>
            ))}
          </>
        )}
      </nav>
      <div style={{borderTop:"1px solid #f1f5f9",padding:"12px 10px"}}>
        {col?(
          <div style={{display:"flex",justifyContent:"center"}}>
            <div style={{width:32,height:32,borderRadius:"50%",background:"#f1f5f9",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,color:"#64748b"}}>SR</div>
          </div>
        ):(
          <div style={{display:"flex",alignItems:"center",gap:9}}>
            <div style={{width:32,height:32,borderRadius:"50%",background:"#f1f5f9",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,color:"#64748b",flexShrink:0}}>SR</div>
            <div><p style={{fontSize:12,fontWeight:700,color:"#0f172a"}}>Sarah R.</p><p style={{fontSize:10,color:"#94a3b8",fontWeight:500}}>Product Lead</p></div>
          </div>
        )}
      </div>
    </div>
  );
}

function TopNav({page}){
  return(
    <div style={{height:56,background:"white",borderBottom:"1px solid #e2e8f0",display:"flex",alignItems:"center",padding:"0 24px",gap:16,flexShrink:0,...SANS}}>
      <h1 style={{fontSize:14,fontWeight:800,color:"#0f172a",letterSpacing:-0.3,width:120,flexShrink:0}}>{TITLES[page]}</h1>
      <div style={{flex:1,maxWidth:360,display:"flex",alignItems:"center",height:36,borderRadius:12,background:"#f1f5f9",overflow:"hidden"}}>
        <span className="mso" style={{fontSize:18,color:"#94a3b8",padding:"0 8px 0 12px"}}>search</span>
        <input placeholder="Search projects, tasks…" style={{flex:1,background:"transparent",border:"none",outline:"none",fontSize:13,color:"#0f172a",...SANS,paddingRight:12}}/>
      </div>
      <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}}>
        {["notifications","settings"].map(icon=>(
          <button key={icon} style={{width:36,height:36,borderRadius:10,background:"#f1f5f9",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#64748b"}}
            onMouseEnter={e=>e.currentTarget.style.background="#e2e8f0"}
            onMouseLeave={e=>e.currentTarget.style.background="#f1f5f9"}>
            <span className="mso" style={{fontSize:20}}>{icon}</span>
          </button>
        ))}
        <div style={{width:1,height:28,background:"#e2e8f0",margin:"0 4px"}}/>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end"}}>
          <span style={{fontSize:12,fontWeight:700,color:"#0f172a"}}>Sarah R.</span>
          <span style={{fontSize:10,color:"#94a3b8",fontWeight:500}}>Product Lead</span>
        </div>
        <div style={{width:36,height:36,borderRadius:"50%",background:"#e2e8f0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:"#64748b",border:"2px solid white",boxShadow:"0 0 0 2px #e2e8f0"}}>SR</div>
        <div style={{width:1,height:28,background:"#e2e8f0",margin:"0 4px"}}/>
        <button style={{height:34,padding:"0 14px",borderRadius:10,background:BLUE,border:"none",color:"white",fontSize:12,fontWeight:700,cursor:"pointer",...SANS,whiteSpace:"nowrap"}}
          onMouseEnter={e=>e.currentTarget.style.opacity="0.9"}
          onMouseLeave={e=>e.currentTarget.style.opacity="1"}>+ New Project</button>
      </div>
    </div>
  );
}

function App(){
  const[page,setPage]=useState("overview");
  const pages={
    overview:<OverviewPage/>,
    clients:<ClientsPage/>,
    automation:<AutomationPage/>,
    workload:<WorkloadPage/>,
    revenue:<RevenuePage/>,
    feedback:<FeedbackPage/>,
  };
  return(
    <div style={{display:"flex",height:"100vh",overflow:"hidden",...SANS}}>
      <Sidebar page={page} setPage={setPage}/>
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",background:"#f8fafc"}}>
        <TopNav page={page}/>
        <div style={{flex:1,overflowY:"auto"}}>
          {pages[page]}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
